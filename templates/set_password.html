{% extends 'base.html' %}
{% block content %}
<div class="login-container">
    <div class="login-box glass-panel">
        <h1><i class='bx bxs-key'></i> Set Password</h1>
        <p>Secure your new account</p>
        
        <input type="hidden" id="reset-uid" value="{{ uid }}">
        <input type="hidden" id="reset-token" value="{{ token }}">
        
        <div class="form-group">
            <label>New Password</label>
            <div class="password-wrapper">
                <input type="password" id="set-password" placeholder="Choose a secure password">
                <button type="button" class="password-toggle" onclick="togglePassword('set-password', this)"><i class='bx bx-show'></i></button>
            </div>
            <small style="color: var(--text-muted); font-size: 0.75rem; display: block; margin-top: 0.5rem; text-align: left;">
                * Password must be at least 8 characters and contain both letters and numbers.
            </small>
        </div>
        <div class="form-group">
            <label>Confirm Password</label>
            <div class="password-wrapper">
                <input type="password" id="set-confirm-password" placeholder="Confirm your password">
                <button type="button" class="password-toggle" onclick="togglePassword('set-confirm-password', this)"><i class='bx bx-show'></i></button>
            </div>
        </div>
        <button id="set-password-btn" class="btn success" style="width:100%">Set Password & Log In</button>
        <div id="auth-error" class="error-msg"></div>
    </div>
</div>
{% endblock %}

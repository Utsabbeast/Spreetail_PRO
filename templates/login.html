{% extends 'base.html' %}
{% block content %}
<div class="login-container">
    <div class="login-box glass-panel">
        <h1><i class='bx bxs-wallet' ></i> Splitwise</h1>
        <p>Log in or sign up to continue</p>
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter username">
        </div>
        <div class="form-group">
            <label>Password</label>
            <div class="password-wrapper">
                <input type="password" id="password" placeholder="Enter your password">
                <button type="button" class="password-toggle" onclick="togglePassword('password', this)"><i class='bx bx-show'></i></button>
            </div>
        </div>
        <button id="login-btn" class="btn primary" style="width:100%">Log In</button>
        <p style="margin-top: 1rem; font-size: 0.875rem;">
            New to Splitwise? <a href="/register/" style="color: var(--primary); text-decoration: none; font-weight: 600;">Register here</a>
        </p>
        <div id="auth-error" class="error-msg"></div>
    </div>
</div>
{% endblock %}

{% extends 'base.html' %}
{% block content %}
<div class="login-container">
    <div class="login-box glass-panel">
        <h1><i class='bx bxs-user-plus'></i> Register</h1>
        <p>Create a new Splitwise account</p>
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="reg-username" placeholder="Choose a username">
            <small style="color: var(--text-muted); font-size: 0.75rem; display: block; margin-top: 0.5rem; text-align: left;">
                * Username must be at least 3 characters.
            </small>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="reg-email" placeholder="Enter your email">
        </div>
        <button id="register-submit-btn" class="btn primary" style="width:100%">Send Activation Link</button>
        <p style="margin-top: 1rem; font-size: 0.875rem;">
            Already have an account? <a href="/login/" style="color: var(--primary); text-decoration: none; font-weight: 600;">Log In</a>
        </p>
        <div id="auth-error" class="error-msg"></div>
    </div>
</div>
{% endblock %}
